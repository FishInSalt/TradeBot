# === Exchange Configuration ===
exchange:
  name: simulated               # Use local simulated exchange (no real API calls for trading)
  fee_rate: 0.0005              # Taker fee rate (0.05%)
  precision:                    # Symbol → decimal places for amount truncation
    BTC/USDT:USDT: 3
    ETH/USDT:USDT: 2

# === Trading Parameters ===
trading:
  symbol: BTC/USDT:USDT        # Trading pair (ccxt unified symbol for USDT perpetual)
  timeframe: 15m               # Candlestick interval for technical analysis (1m/5m/15m/1H/4H)
  initial_balance_usdt: 100.0  # Starting capital in USDT (used for metrics calculation)

# === LLM Model Configuration ===
models:
  default: anthropic:claude-sonnet-4-20250514   # Fallback model for unspecified tasks
  strong: anthropic:claude-opus-4-6             # High-capability model (complex analysis)
  weak: anthropic:claude-haiku-4-5-20251001     # Fast/cheap model (simple tasks)
  routing:                     # Which model tier to use for each task type
    market_analysis: strong    # Market data analysis and interpretation
    trade_decision: strong     # Final trading decision (buy/sell/hold)
    news_summary: weak         # News article summarization (Phase 1b)
    review: weak               # Post-trade review and memory updates (Phase 1b)

# === Scheduler Configuration ===
scheduler:
  interval_minutes: 15         # How often the agent wakes up to analyze the market
  cooldown_seconds: 60         # Minimum seconds between two consecutive wake cycles

# === LLM Cost Control ===
llm_budget:
  daily_max_tokens: 500000     # Max tokens per day across all LLM calls; agent sleeps when exhausted

# === Database ===
database:
  url: "sqlite+aiosqlite:///data/tradebot.db"  # SQLAlchemy async connection string

# === Human Approval Gate ===
approval:
  enabled: true                # If true, agent pauses before executing trades for human confirmation
  timeout_seconds: 300         # Seconds to wait for approval before auto-skipping the trade
