# === Trader Agent Persona ===
# These preferences shape the AI trader's system prompt and decision-making behavior.
# Changing these values creates a different "trading personality".

persona:
  # personality: null            # Trader temperament (optional, default: null = agent decides):
                                 #   conservative: patient, capital-preservation-first
                                 #   moderate: balanced, pragmatic
                                 #   aggressive: decisive, action-oriented
                                 #   null (omit or set to null): agent chooses freely

  # trading_style: null          # Strategy preference (optional, default: null = agent decides):
                                 #   trend_following: ride momentum, enter on pullbacks
                                 #   swing: buy support, sell resistance
                                 #   breakout: act on consolidation breakouts with volume
                                 #   null (omit or set to null): agent chooses freely

  # P3 placeholder fields below — currently unused at runtime.
  # Reserved for hard risk control before live trading. Not injected
  # into the system prompt and not validated at tool entry, by A1
  # design (2026-04-15) to avoid anchoring agent decisions during the
  # observation period. See:
  #   - docs/superpowers/specs/2026-04-15-agent-experience-design.md
  #   - PersonaConfig docstring in src/config.py (R2-6 wontfix rationale)
  position_sizing: percentage    # only "percentage" path is implemented; "fixed" reserved for P3
  max_position_pct: 30           # P3 placeholder — currently unused
  preferred_leverage: 3          # P3 placeholder — currently unused
  stop_loss_pct: 3.0             # P3 placeholder — currently unused
  take_profit_pct: 6.0           # P3 placeholder — currently unused
