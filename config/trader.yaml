# === Trader Agent Persona ===
# These preferences shape the AI trader's system prompt and decision-making behavior.
# Changing these values creates a different "trading personality".

persona:
  # personality: null            # Trader temperament (optional, default: null = agent decides):
                                 #   conservative: patient, capital-preservation-first
                                 #   moderate: balanced, pragmatic
                                 #   aggressive: decisive, action-oriented
                                 #   null (omit or set to null): agent chooses freely

  # trading_style: null          # Strategy preference (optional, default: null = agent decides):
                                 #   trend_following: ride momentum, enter on pullbacks
                                 #   swing: buy support, sell resistance
                                 #   breakout: act on consolidation breakouts with volume
                                 #   null (omit or set to null): agent chooses freely

  position_sizing: percentage    # fixed: use a fixed USDT amount per trade
                                 # percentage: use a % of available balance per trade

  max_position_pct: 30           # Max single position as % of available balance (soft limit in prompt)
  preferred_leverage: 3          # Preferred leverage multiplier (soft limit in prompt)
  stop_loss_pct: 3.0             # Default stop loss distance from entry price (%)
  take_profit_pct: 6.0           # Default take profit distance from entry price (%)
